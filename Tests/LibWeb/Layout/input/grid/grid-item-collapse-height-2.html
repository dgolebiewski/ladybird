<!DOCTYPE html>
<head>
<style>
    div {
        overflow: hidden;
        height: min-content;
    }

    #grid {
        display: grid;
        grid-template-rows: 1fr;
    }

    #grid-doesnt-collapse {
        display: grid;
        height: min-content;
        grid-template-rows: 0fr;
    }
</style>
</head>

<body>
    <div id="grid-doesnt-collapse"><div>should be visible</div></div>
    <div id="grid">should not be at the top of the page</div>
</body>
</html>
