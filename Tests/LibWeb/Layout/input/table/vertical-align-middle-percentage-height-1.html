<!DOCTYPE html>
<html>
<meta charset=utf-8>
<style>
    body {
        margin: 0;
    }

    #wrapper {
        position: absolute;
        width: 100%;
        height: 100%;
        vertical-align: middle;
    }


    #table {
        display: table;
        width: 100%;
        height: 100%;
    }

    #cell {
        display: table-cell;
        width: 100%;
        height: 100%;
        vertical-align: middle;
    }

    #box {
        width: 64px;
        height: 64px;
        background-color: green;
        display: block;
        margin-right: auto;
        margin-left: auto;
    }
</style>
</head>

<body>
    <div id="wrapper">
        <div id="table">
            <div id="cell">
                <div id="box">
                    I am centered.
                </div>
            </div>
        </div>
    </div>
</body>

</html>
