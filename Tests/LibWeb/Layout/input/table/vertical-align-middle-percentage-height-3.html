<!DOCTYPE html>
<html>
<meta charset=utf-8>
<style>
    body {
        margin: 0;
    }

    #wrapper {
        position: absolute;
        width: 100%;
        height: 100%;
        vertical-align: middle;
    }


    #table {
        display: table;
        width: 100%;
        height: 100%;
    }

    #cell {
        display: table-cell;
        width: 100%;
        height: 50%;
        vertical-align: middle;
    }
</style>
</head>

<body>
    <div id="wrapper">
        <div id="table">
            <div id="cell">
                <span>I am vertically centered.</span>
            </div>
        </div>
    </div>
</body>

</html>
